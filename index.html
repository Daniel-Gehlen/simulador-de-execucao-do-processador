<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Execução - Processador Passo a Passo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔍 Simulador de Execução do Processador</h1>
        <button id="langBtn">EN</button>
      </div>
      <div class="subtitle">
        Clique em NEXT para executar cada instrução - Veja o processador em
        ação!
      </div>

      <div class="nav">
        <label for="exampleSelect">Escolha um exemplo:</label>
        <select id="exampleSelect">
          <option value="sumLoop">Loop de Soma</option>
          <option value="factorial">Fatorial</option>
          <option value="fibonacci">Fibonacci</option>
          <option value="maxArray">Máximo em Array</option>
          <option value="ifElse">If / Else</option>
          <option value="whileLoop">While</option>
          <option value="doWhileLoop">Do / While</option>
          <option value="switchCase">Switch</option>
          <option value="functions">Funções</option>
          <option value="recursion">Recursão</option>
          <option value="pointers">Ponteiros</option>
          <option value="stringArray">String / Char Array</option>
          <option value="scanfInput">Entrada com scanf</option>
          <option value="structExample">Struct</option>
          <option value="breakContinue">Break / Continue</option>
        </select>
      </div>

      <div class="main-content">
        <!-- Código -->
        <div class="code-panel">
          <h2>📝 Código Fonte</h2>
          <div class="code-container">
            <pre><code id="codeLines"></code></pre>
          </div>
        </div>

        <!-- Variáveis -->
        <div class="variables-panel">
          <h2>📊 Variáveis na Memória</h2>
          <table class="var-table">
            <tbody id="varTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Controles -->
      <div class="control-panel">
        <button id="prevBtn" disabled>◀ VOLTAR</button>
        <button id="resetBtn">🔄 RESET</button>
        <button id="nextBtn">NEXT ▶</button>
      </div>

      <!-- Informações -->
      <div class="info-panel">
        <h3>⚙️ Estado do Processador</h3>
        <div class="step-info" id="stepInfo">Aguardando início...</div>
        <div class="step-info" id="pcInfo">PC (Program Counter): 0</div>
        <div class="output-area" id="outputArea">
          <div class="output-line">▶ Programa pronto para execução</div>
        </div>
        <div class="status waiting" id="status">⏸ PRONTO</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
